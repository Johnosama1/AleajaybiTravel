openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Aleajaybi Travel driving school API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Driving lesson bookings
  - name: schedule
    description: Weekly availability schedule
  - name: cars
    description: Cars used for training
  - name: pricing
    description: Course pricing
  - name: admin
    description: Trainer dashboard endpoints (require X-Admin-Token)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pricing:
    get:
      operationId: getPricing
      tags: [pricing]
      summary: Get the course pricing
      description: Returns the course price and session count
      responses:
        "200":
          description: Pricing info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pricing"

  /schedule:
    get:
      operationId: getSchedule
      tags: [schedule]
      summary: Get the weekly operating schedule
      description: Returns the days of the week (per transmission) and the bookable slots
      responses:
        "200":
          description: Weekly schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /availability:
    get:
      operationId: getAvailability
      tags: [bookings]
      summary: Get availability for a specific car and week
      description: Returns booked slot keys for the given car and week so the UI can lock them
      parameters:
        - in: query
          name: carId
          required: true
          description: ID of the car to check availability for
          schema:
            type: integer
        - in: query
          name: weekStart
          required: true
          description: ISO date (YYYY-MM-DD) of the Saturday that starts the week
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Availability info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Availability"

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      description: Returns all bookings sorted by week and time
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      description: Books a slot for a specific car, week, day and start time. Fails if already taken.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "409":
          description: Slot already booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/stats:
    get:
      operationId: getBookingStats
      tags: [bookings]
      summary: Booking statistics
      description: Quick stats for the homepage (total bookings, this week, popular times)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingStats"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking by id
      description: Used by the confirmation page to poll payment status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/payment:
    post:
      operationId: submitBookingPayment
      tags: [bookings]
      summary: Submit payment proof for a booking
      description: Customer submits the payment method and transaction reference. Booking moves to "submitted" until the trainer confirms it.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPaymentRequest"
      responses:
        "200":
          description: Payment submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Verify the trainer admin token
      description: Returns ok if the supplied token matches the configured ADMIN_TOKEN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Token accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"
        "401":
          description: Token rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/bookings:
    get:
      operationId: adminListBookings
      tags: [admin]
      summary: List all bookings for the trainer dashboard
      parameters:
        - in: header
          name: X-Admin-Token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bookings list with admin fields
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/bookings/{id}/confirm:
    post:
      operationId: adminConfirmBooking
      tags: [admin]
      summary: Trainer confirms payment was received
      description: Marks the booking as paid and returns the wa.me URL the dashboard should open to notify the trainer.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: X-Admin-Token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfirmResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/bookings/{id}/reject:
    post:
      operationId: adminRejectBooking
      tags: [admin]
      summary: Trainer rejects an unverified payment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: X-Admin-Token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking reset to awaiting payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cars:
    get:
      operationId: listCars
      tags: [cars]
      summary: List training cars
      description: Returns the cars the school uses for training
      responses:
        "200":
          description: List of cars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Car"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Pricing:
      type: object
      properties:
        priceEgp:
          type: integer
          description: Price for the full course in Egyptian Pounds
        sessionsCount:
          type: integer
          description: Number of sessions included in the course
        currency:
          type: string
          description: ISO 4217 currency code
        vodafoneCashNumber:
          type: string
          description: Vodafone Cash wallet number to send the payment to
        instapayHandle:
          type: string
          description: InstaPay handle to send the payment to
      required:
        - priceEgp
        - sessionsCount
        - currency
        - vodafoneCashNumber
        - instapayHandle

    Schedule:
      type: object
      properties:
        daysManual:
          type: array
          description: Day-of-week numbers available for manual cars (0=Saturday ... 6=Friday)
          items:
            type: integer
            minimum: 0
            maximum: 6
        daysAutomatic:
          type: array
          description: Day-of-week numbers available for automatic cars
          items:
            type: integer
            minimum: 0
            maximum: 6
        slots:
          type: array
          description: Bookable slot start times (minutes from midnight). Each slot is slotIntervalMinutes long.
          items:
            type: integer
            minimum: 0
            maximum: 1439
        slotIntervalMinutes:
          type: integer
          description: Duration between consecutive slot start times (e.g. 75 for 1h15m)
        whatsappPhone:
          type: string
          description: WhatsApp contact number used by the school
      required:
        - daysManual
        - daysAutomatic
        - slots
        - slotIntervalMinutes
        - whatsappPhone

    Availability:
      type: object
      properties:
        carId:
          type: integer
        weekStart:
          type: string
          format: date
        bookedSlots:
          type: array
          description: List of slot identifiers in the form "dayOfWeek-startMinutes" that are already booked this week for this car
          items:
            type: string
      required:
        - carId
        - weekStart
        - bookedSlots

    PaymentStatus:
      type: string
      enum: [pending, submitted, paid]
      description: |
        pending = booking created, no payment info yet
        submitted = customer entered payment reference, awaiting trainer review
        paid = trainer confirmed money received

    PaymentMethod:
      type: string
      enum: [vodafone_cash, instapay]

    Booking:
      type: object
      properties:
        id:
          type: integer
        carId:
          type: integer
        name:
          type: string
        phone:
          type: string
        weekStart:
          type: string
          format: date
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        startMinutes:
          type: integer
          minimum: 0
          maximum: 1439
        notes:
          type: string
          nullable: true
        priceEgp:
          type: integer
        sessionsCount:
          type: integer
        paymentStatus:
          $ref: "#/components/schemas/PaymentStatus"
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
          nullable: true
        paymentReference:
          type: string
          nullable: true
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - carId
        - name
        - phone
        - weekStart
        - dayOfWeek
        - startMinutes
        - priceEgp
        - sessionsCount
        - paymentStatus
        - createdAt

    CreateBookingRequest:
      type: object
      properties:
        carId:
          type: integer
        name:
          type: string
          minLength: 2
          maxLength: 80
        phone:
          type: string
          minLength: 6
          maxLength: 20
        weekStart:
          type: string
          format: date
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        startMinutes:
          type: integer
          minimum: 0
          maximum: 1439
        notes:
          type: string
          maxLength: 500
      required:
        - carId
        - name
        - phone
        - weekStart
        - dayOfWeek
        - startMinutes

    SubmitPaymentRequest:
      type: object
      properties:
        method:
          $ref: "#/components/schemas/PaymentMethod"
        reference:
          type: string
          minLength: 4
          maxLength: 80
          description: Vodafone Cash / InstaPay transaction reference number from the SMS confirmation
      required:
        - method
        - reference

    AdminLoginRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
        - token

    AdminLoginResult:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    AdminConfirmResult:
      type: object
      properties:
        booking:
          $ref: "#/components/schemas/Booking"
        whatsappUrl:
          type: string
          description: wa.me URL the dashboard should open to notify the trainer
      required:
        - booking
        - whatsappUrl

    BookingStats:
      type: object
      properties:
        totalBookings:
          type: integer
        thisWeekBookings:
          type: integer
        nextAvailableSlot:
          type: string
          nullable: true
          description: A friendly description of the next available slot
        popularDay:
          type: integer
          nullable: true
          minimum: 0
          maximum: 6
      required:
        - totalBookings
        - thisWeekBookings

    Car:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        model:
          type: string
        transmission:
          type: string
          enum: [manual, automatic]
        imageUrl:
          type: string
        description:
          type: string
      required:
        - id
        - name
        - model
        - transmission
        - imageUrl
        - description

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
