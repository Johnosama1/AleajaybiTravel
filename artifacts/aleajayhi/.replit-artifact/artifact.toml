kind = "web"
previewPath = "/"
title = "Aleajayhi Driving School"
version = "1.0.0"
id = "artifacts/aleajayhi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21621

[services.development]
run = "pnpm --filter @workspace/aleajayhi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aleajayhi", "run", "build" ]
publicDir = "artifacts/aleajayhi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21621"
BASE_PATH = "/"
