<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة المدرب — Aleajaybi Travel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --primary: #d4a017;
      --primary-dim: rgba(212,160,23,.15);
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --green-dim: rgba(63,185,80,.12);
      --amber: #d29922;
      --amber-dim: rgba(210,153,34,.12);
      --red: #f85149;
      --red-dim: rgba(248,81,73,.12);
      --radius: 14px;
    }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 1.1rem; color: var(--primary); }
    .logo span { color: var(--text); font-weight: 600; font-size: .85rem; }
    #btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: .85rem; transition: all .2s; }
    #btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* LOGIN */
    #screen-login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px; text-align: center; }
    .login-icon { width: 60px; height: 60px; border-radius: 16px; background: var(--primary-dim); color: var(--primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 1.6rem; }
    .login-card h1 { font-size: 1.4rem; font-weight: 900; margin-bottom: 6px; }
    .login-card p { color: var(--muted); font-size: .9rem; margin-bottom: 24px; }
    label { display: block; text-align: right; font-size: .85rem; font-weight: 700; margin-bottom: 6px; }
    input[type=password], input[type=text] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'Cairo', sans-serif; font-size: .95rem; outline: none; transition: border-color .2s; }
    input:focus { border-color: var(--primary); }
    .btn-primary { width: 100%; background: var(--primary); color: #000; font-family: 'Cairo', sans-serif; font-weight: 900; font-size: 1rem; padding: 13px; border: none; border-radius: 10px; cursor: pointer; margin-top: 16px; transition: opacity .2s; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .error-msg { background: var(--red-dim); border: 1px solid var(--red); border-radius: 8px; color: var(--red); padding: 10px 14px; font-size: .85rem; margin-top: 12px; display: none; }

    /* DASHBOARD */
    #screen-dashboard { display: none; }
    main { max-width: 960px; margin: 0 auto; padding: 28px 20px; }
    .dashboard-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .dashboard-header h1 { font-size: 1.35rem; font-weight: 900; color: var(--primary); }
    .dashboard-header p { color: var(--muted); font-size: .85rem; margin-top: 2px; }
    .header-actions { display: flex; gap: 10px; }
    .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: 'Cairo', sans-serif; font-weight: 700; font-size: .85rem; padding: 8px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: border-color .2s; }
    .btn-secondary:hover { border-color: var(--primary); }

    /* TABS */
    .tabs { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    .tab-btn { background: var(--card); border: none; color: var(--muted); font-family: 'Cairo', sans-serif; font-weight: 700; font-size: .9rem; padding: 12px; cursor: pointer; border-left: 1px solid var(--border); transition: all .2s; }
    .tab-btn:last-child { border-left: none; }
    .tab-btn.active { background: var(--primary-dim); color: var(--primary); }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; gap: 14px; }

    /* BOOKING ROW */
    .booking-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .booking-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .booking-name { font-size: 1rem; font-weight: 900; }
    .booking-phone { color: var(--primary); font-weight: 700; font-size: .9rem; direction: ltr; text-decoration: none; }
    .booking-phone:hover { text-decoration: underline; }
    .booking-date { color: var(--muted); font-size: .85rem; margin-top: 4px; }
    .booking-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: .82rem; color: var(--muted); margin-top: 6px; }
    .booking-meta b { color: var(--text); }
    .booking-ref { font-size: .8rem; color: var(--muted); margin-top: 4px; }
    .booking-ref code { color: var(--text); font-weight: 700; direction: ltr; display: inline-block; }
    .proof-img { margin-top: 10px; max-height: 150px; border-radius: 10px; border: 1px solid var(--border); object-fit: contain; background: #000a; cursor: pointer; }
    .booking-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-confirm { background: var(--green); color: #000; font-family: 'Cairo', sans-serif; font-weight: 900; font-size: .85rem; padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: opacity .2s; }
    .btn-confirm:hover { opacity: .85; }
    .btn-reject { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); font-family: 'Cairo', sans-serif; font-weight: 700; font-size: .85rem; padding: 8px 14px; border-radius: 8px; cursor: pointer; transition: opacity .2s; }
    .btn-reject:hover { opacity: .75; }
    .btn-confirm:disabled, .btn-reject:disabled { opacity: .4; cursor: not-allowed; }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: .75rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
    .badge-submitted { background: var(--amber-dim); border: 1px solid var(--amber); color: var(--amber); }
    .badge-paid { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
    .badge-pending { background: var(--card); border: 1px solid var(--border); color: var(--muted); }

    /* EMPTY */
    .empty-state { border: 1px dashed var(--border); border-radius: var(--radius); padding: 48px 24px; text-align: center; color: var(--muted); font-size: .9rem; }

    /* TOAST */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 22px; font-size: .9rem; font-weight: 700; z-index: 9999; transition: transform .3s; pointer-events: none; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--red); color: var(--red); }

    /* SPINNER */
    .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* REFRESH indicator */
    .refresh-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    @media(max-width:600px) {
      .booking-top { flex-direction: column; }
      .booking-actions { width: 100%; justify-content: flex-end; }
      .tabs { grid-template-columns: 1fr; }
      .tab-btn { border-left: none; border-top: 1px solid var(--border); }
      .tab-btn:first-child { border-top: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-icon">🛡️</div>
    <h1>لوحة المدرب</h1>
    <p>أدخل كلمة سر المدرب للوصول للحجوزات.</p>
    <form id="form-login">
      <label for="inp-token">كلمة السر</label>
      <input type="password" id="inp-token" placeholder="••••••••" required autocomplete="current-password" />
      <button type="submit" class="btn-primary" id="btn-login">دخول</button>
      <div class="error-msg" id="login-error"></div>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dashboard">
  <header>
    <div class="logo">
      🚗 Aleajaybi Travel
      <span>لوحة المدرب</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="refresh-dot" title="يتحدث كل 8 ثوانٍ"></span>
      <button class="btn-secondary" id="btn-refresh-top">🔄 تحديث</button>
      <button id="btn-logout">خروج</button>
    </div>
  </header>

  <main>
    <div class="dashboard-header">
      <div>
        <h1>الحجوزات</h1>
        <p>راجع المدفوعات وأكّد الحجوزات — يتحدث تلقائياً.</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="submitted">للمراجعة (<span id="count-submitted">0</span>)</button>
      <button class="tab-btn" data-tab="paid">مؤكدة (<span id="count-paid">0</span>)</button>
      <button class="tab-btn" data-tab="pending">لم يدفع (<span id="count-pending">0</span>)</button>
    </div>

    <div id="tab-submitted" class="tab-content active"></div>
    <div id="tab-paid" class="tab-content"></div>
    <div id="tab-pending" class="tab-content"></div>
  </main>
</div>

<div id="toast"></div>

<script>
const TOKEN_KEY = 'aleajaybi_panel_token';
const DAY_NAMES = ['السبت','الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];

let token = localStorage.getItem(TOKEN_KEY) || '';
let bookings = [];
let activeTab = 'submitted';
let refreshTimer = null;
let busyId = null;

// ── Utils ──────────────────────────────────────────────
function fmt(minutes) {
  const h = Math.floor(minutes / 60).toString().padStart(2,'0');
  const m = (minutes % 60).toString().padStart(2,'0');
  return h + ':' + m;
}
function bookingDate(b) {
  const d = new Date(b.weekStart + 'T00:00:00');
  d.setDate(d.getDate() + b.dayOfWeek);
  return d;
}
function arabicDate(d) {
  return d.toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
}
function methodLabel(m) {
  if (m === 'vodafone_cash') return 'Vodafone Cash';
  if (m === 'instapay') return 'InstaPay';
  return '—';
}
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// ── Auth ──────────────────────────────────────────────
function authHeaders() {
  return { 'Content-Type': 'application/json', 'X-Admin-Token': token };
}
async function doLogin(t) {
  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: t }),
  });
  if (!res.ok) {
    const d = await res.json().catch(() => ({}));
    throw new Error(d.message || 'كلمة السر غير صحيحة.');
  }
  return res.json();
}

// ── Screens ───────────────────────────────────────────
function showLogin() {
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('screen-dashboard').style.display = 'none';
  stopRefresh();
}
function showDashboard() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-dashboard').style.display = 'block';
  loadBookings();
  startRefresh();
}

// ── Bookings ──────────────────────────────────────────
async function loadBookings() {
  try {
    const res = await fetch('/api/admin/bookings', { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    bookings = await res.json();
    render();
  } catch (e) {
    showToast('تعذر تحميل الحجوزات', 'error');
  }
}
function startRefresh() {
  stopRefresh();
  refreshTimer = setInterval(loadBookings, 8000);
}
function stopRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
}
function logout() {
  token = '';
  localStorage.removeItem(TOKEN_KEY);
  stopRefresh();
  showLogin();
}

// ── Render ────────────────────────────────────────────
function render() {
  const submitted = bookings.filter(b => b.paymentStatus === 'submitted');
  const paid      = bookings.filter(b => b.paymentStatus === 'paid');
  const pending   = bookings.filter(b => b.paymentStatus === 'pending');

  document.getElementById('count-submitted').textContent = submitted.length;
  document.getElementById('count-paid').textContent = paid.length;
  document.getElementById('count-pending').textContent = pending.length;

  renderTab('submitted', submitted, true);
  renderTab('paid', paid, false);
  renderTab('pending', pending, false);
}

function renderTab(name, list, hasActions) {
  const el = document.getElementById('tab-' + name);
  if (list.length === 0) {
    el.innerHTML = '<div class="empty-state">📭 لا توجد حجوزات في هذا القسم.</div>';
    return;
  }
  el.innerHTML = list.map(b => bookingCardHTML(b, hasActions)).join('');
  // attach events
  el.querySelectorAll('[data-confirm]').forEach(btn => {
    btn.addEventListener('click', () => confirmBooking(+btn.dataset.confirm));
  });
  el.querySelectorAll('[data-reject]').forEach(btn => {
    btn.addEventListener('click', () => rejectBooking(+btn.dataset.reject));
  });
}

function bookingCardHTML(b, hasActions) {
  const d = bookingDate(b);
  const dateStr = DAY_NAMES[b.dayOfWeek] + ' ' + arabicDate(d);
  const badge = b.paymentStatus === 'paid'
    ? '<span class="badge badge-paid">✅ مؤكد</span>'
    : b.paymentStatus === 'submitted'
    ? '<span class="badge badge-submitted">🕐 للمراجعة</span>'
    : '<span class="badge badge-pending">⏳ لم يدفع</span>';

  const proof = b.paymentProofUrl
    ? `<div><img src="${b.paymentProofUrl}" class="proof-img" alt="إيصال" onclick="window.open(this.src,'_blank')" /></div>`
    : '';

  const ref = b.paymentReference
    ? `<div class="booking-ref">رقم العملية: <code dir="ltr">${b.paymentReference}</code></div>`
    : '';

  const actions = hasActions ? `
    <div class="booking-actions">
      <button class="btn-reject" data-reject="${b.id}" ${busyId===b.id?'disabled':''}>رفض</button>
      <button class="btn-confirm" data-confirm="${b.id}" ${busyId===b.id?'disabled':''}>
        ${busyId===b.id ? '<span class="spin"></span>' : '✅ تأكيد'}
      </button>
    </div>` : '';

  return `
    <div class="booking-card" id="bcard-${b.id}">
      <div class="booking-top">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span class="booking-name">${b.name}</span>
            <a href="tel:${b.phone}" class="booking-phone" dir="ltr">${b.phone}</a>
            ${badge}
          </div>
          <div class="booking-date">${dateStr} — <b dir="ltr">${fmt(b.startMinutes)}</b></div>
          <div class="booking-meta">
            <span>المبلغ: <b>${b.priceEgp} ج.م</b></span>
            <span>·</span>
            <span>الحصص: <b>${b.sessionsCount}</b></span>
            <span>·</span>
            <span>الوسيلة: <b>${methodLabel(b.paymentMethod)}</b></span>
          </div>
          ${ref}
          ${proof}
        </div>
        ${actions}
      </div>
    </div>`;
}

// ── Actions ───────────────────────────────────────────
async function confirmBooking(id) {
  if (busyId) return;
  busyId = id;
  render();
  try {
    const res = await fetch(`/api/admin/bookings/${id}/confirm`, {
      method: 'POST', headers: authHeaders(),
    });
    if (!res.ok) throw new Error((await res.json().catch(()=>({}))).message || 'خطأ');
    showToast('✅ تم تأكيد الحجز بنجاح');
    await loadBookings();
  } catch (e) {
    showToast(e.message || 'تعذر التأكيد', 'error');
  } finally {
    busyId = null;
    render();
  }
}
async function rejectBooking(id) {
  if (busyId) return;
  if (!confirm('هل تريد رفض هذا الدفع وإعادة الحجز لحالة الانتظار؟')) return;
  busyId = id;
  render();
  try {
    const res = await fetch(`/api/admin/bookings/${id}/reject`, {
      method: 'POST', headers: authHeaders(),
    });
    if (!res.ok) throw new Error((await res.json().catch(()=>({}))).message || 'خطأ');
    showToast('تم رفض الدفع', 'error');
    await loadBookings();
  } catch (e) {
    showToast(e.message || 'تعذر الرفض', 'error');
  } finally {
    busyId = null;
    render();
  }
}

// ── Tab switching ─────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + activeTab).classList.add('active');
  });
});

// ── Login form ────────────────────────────────────────
document.getElementById('form-login').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('login-error');
  const t = document.getElementById('inp-token').value.trim();
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  err.style.display = 'none';
  try {
    await doLogin(t);
    token = t;
    localStorage.setItem(TOKEN_KEY, token);
    showDashboard();
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'دخول';
  }
});

// ── Refresh button ────────────────────────────────────
document.getElementById('btn-refresh-top').addEventListener('click', () => {
  loadBookings();
  startRefresh();
});
document.getElementById('btn-logout').addEventListener('click', logout);

// ── Init ──────────────────────────────────────────────
if (token) {
  showDashboard();
} else {
  showLogin();
}
</script>
</body>
</html>
